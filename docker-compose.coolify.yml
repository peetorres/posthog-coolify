services:
  # Keep PostHog's route-aware Caddy proxy, but leave public ports and TLS to Coolify.
  proxy:
    ports: !reset []
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.http-0-y6s32fammnhcr2l7x4ulkhlw.entryPoints=http"
      - "traefik.http.routers.http-0-y6s32fammnhcr2l7x4ulkhlw.middlewares=redirect-to-https"
      - "traefik.http.routers.http-0-y6s32fammnhcr2l7x4ulkhlw.rule=Host(`posthog.app.iapplabs.com`) && PathPrefix(`/`)"
      - "traefik.http.routers.http-0-y6s32fammnhcr2l7x4ulkhlw.service=http-0-y6s32fammnhcr2l7x4ulkhlw"
      - "traefik.http.routers.https-0-y6s32fammnhcr2l7x4ulkhlw.entryPoints=https"
      - "traefik.http.routers.https-0-y6s32fammnhcr2l7x4ulkhlw.middlewares=gzip"
      - "traefik.http.routers.https-0-y6s32fammnhcr2l7x4ulkhlw.rule=Host(`posthog.app.iapplabs.com`) && PathPrefix(`/`)"
      - "traefik.http.routers.https-0-y6s32fammnhcr2l7x4ulkhlw.service=https-0-y6s32fammnhcr2l7x4ulkhlw"
      - "traefik.http.routers.https-0-y6s32fammnhcr2l7x4ulkhlw.tls=true"
      - "traefik.http.routers.https-0-y6s32fammnhcr2l7x4ulkhlw.tls.certresolver=letsencrypt"
      - "traefik.http.services.http-0-y6s32fammnhcr2l7x4ulkhlw.loadbalancer.server.port=80"
      - "traefik.http.services.https-0-y6s32fammnhcr2l7x4ulkhlw.loadbalancer.server.port=80"
    environment:
      CADDY_TLS_BLOCK: ""
      CADDY_HOST: "http://"

  web:
    environment:
      IS_BEHIND_PROXY: "True"
      TRUST_ALL_PROXIES: "True"

  # These are internal PostHog dependencies and must not open host ports.
  objectstorage:
    ports: !reset []
  seaweedfs:
    ports: !reset []
  temporal:
    ports: !reset []
  temporal-ui:
    ports: !reset []
